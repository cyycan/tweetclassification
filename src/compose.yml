services:
  app:
    build:
      context: .
      dockerfile: ./app/Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - model_inference_endpoint
    environment:
      - API_URL=http://model_inference_endpoint:8000/get-prediction/

  model_inference_endpoint:
    build:
      context: .
      dockerfile: ./model-inference-endpoint/Dockerfile
    volumes:
      - ../data:/usr/src/app/data
      # mount data files to application, main.py
    environment:
      - DATA_PATH=/usr/src/app/data/Tweets.csv
      - MODEL_PATH=/usr/src/training/tweet_party_model.joblib
    # environment variables
    ports:
      - "8000:8000"